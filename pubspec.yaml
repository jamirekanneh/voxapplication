name: voxapplication
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # ── State Management ─────────────────────────────────
  provider: ^6.1.2

  # ── Storage & Preferences ────────────────────────────
  shared_preferences: ^2.3.2

  # ── File Handling ─────────────────────────────────────
  file_picker: ^10.3.10
  image_picker: ^1.0.7
  syncfusion_flutter_pdf: ^32.2.7

  # ── Document Scanning / OCR ───────────────────────────
  google_mlkit_text_recognition: ^0.13.0

  # ── Audio & Speech ───────────────────────────────────
  flutter_tts: ^4.2.2
  speech_to_text: ^7.3.0
  just_audio: ^0.9.36
  record: ^5.1.2

  # ── Permissions ──────────────────────────────────────
  permission_handler: ^12.0.1

  # ── Authentication ───────────────────────────────────
  google_sign_in: ^6.2.1

  # ── Navigation & Deep Links ──────────────────────────
  app_links: ^6.3.2

  # ── Networking ───────────────────────────────────────
  http: ^1.2.0
  url_launcher: ^6.2.5
  archive: ^3.4.9
  uuid: ^4.3.3

  # ── Environment Variables ────────────────────────────
  flutter_dotenv: ^5.1.0
  translator: ^1.0.4+1
  pdf: ^3.12.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true




  assets:
    - assets/images/shaheer.jpeg
    - assets/images/Jamire.jpeg
    - assets/images/Abubakir.jpeg
    - assets/images/Abdurahman.jpeg
    - assets/images/IMG_3331.jpg
    - assets/images/btn_google_signin.png
    - assets/project.env