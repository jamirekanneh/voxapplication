name: voxapplication
description: "A new Flutter project."
publish_to: "none"
version: 0.1.2+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # ── State Management ─────────────────────────────────
  provider: ^6.1.2
  printing: ^5.11.0
  device_info_plus: ^12.4.0
  rxdart: ^0.28.0
  share_plus: ^12.0.2


  # ── Storage & Preferences ────────────────────────────
  shared_preferences: ^2.3.2

  # ── File Handling ─────────────────────────────────────
  file_picker: ^11.0.2
  image_picker: ^1.0.7
  syncfusion_flutter_pdf: ^33.2.8

  # ── Document Scanning / OCR ───────────────────────────
  google_mlkit_text_recognition: ^0.15.1

  # ── Audio & Speech ───────────────────────────────────
  flutter_tts: ^4.2.2
  speech_to_text: ^7.3.0
  just_audio: ^0.10.5
  record: ^6.2.0

  # ── Permissions ──────────────────────────────────────
  permission_handler: ^12.0.1

  # ── Authentication ───────────────────────────────────
  google_sign_in: ^7.2.0

  # ── Navigation & Deep Links ──────────────────────────
  app_links: ^6.3.2

  # ── Networking ───────────────────────────────────────
  http: ^1.2.0
  url_launcher: ^6.2.5
  archive: ^4.0.9
  uuid: ^4.3.3
  connectivity_plus: ^7.0.0
  hive: ^2.2.3

  # ── Environment Variables ────────────────────────────
  flutter_dotenv: ^6.0.1
  translator: ^1.0.4+1
  pdf: ^3.12.0
  path_provider: ^2.1.5
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  google_fonts: ^8.1.0
  # Runtime dependency so Android 12+ splash can be dismissed via FlutterNativeSplash.remove()
  flutter_native_splash: ^2.4.4
  flutter_timezone: ^5.1.0
  audio_session: ^0.2.3
  sherpa_onnx: ^1.13.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: "assets/images/vox_logo.png"
  image_path: "assets/images/vox_logo.png"

flutter_native_splash:
  color: "#0A0E1A"
  android_12:
    color: "#0A0E1A"

flutter:
  uses-material-design: true




  assets:
    - assets/project.env
    - assets/images/shaheer.jpeg
    - assets/images/Jamire.jpeg
    - assets/images/Abubakir.jpeg
    - assets/images/Abdurahman.jpeg
    - assets/images/IMG_3331.jpg
    - assets/images/Google_Logo.png
    - assets/images/chatbot_logo.png
    - assets/images/vox_logo.png
    - assets/sherpa/keywords.txt
