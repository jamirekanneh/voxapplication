<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vox - Official Homepage</title>
  <style>
    :root { --bg:#f7f8fa; --card:#ffffff; --ink:#111827; --muted:#4b5563; --accent:#0f766e; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "Segoe UI", Arial, sans-serif; background:linear-gradient(180deg,#f7f8fa,#eef2f7); color:var(--ink); }
    .wrap { max-width: 900px; margin: 48px auto; padding: 0 20px; }
    .card { background:var(--card); border-radius:16px; padding:28px; box-shadow:0 12px 30px rgba(0,0,0,.08); }
    h1 { margin-top:0; font-size:2rem; }
    p { line-height:1.6; color:var(--muted); }
    .links a { color:var(--accent); text-decoration:none; margin-right:18px; font-weight:600; }
    .links a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Vox</h1>
      <p>Vox is an AI-powered productivity app that helps users capture, read, and organize content with cloud-backed features.</p>
      <p>For policy details, use the links below.</p>
      <p class="links">
        <a href="./privacy.html">Privacy Policy</a>
        <a href="./terms.html">Terms of Service</a>
      </p>
    </section>
  </main>
</body>
</html>
